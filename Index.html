<html>
<head>
<title>Hacker Animation</title>

<style>
body {
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    text-align: center;
}

/* Blink effect */
.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0;}
    100% {opacity: 1;}
}

/* Typing effect */
.typing {
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid #00ff00;
    width: 0;
    animation: typing 4s steps(30, end) forwards;
}

@keyframes typing {
    from {width: 0;}
    to {width: 100%;}
}

button {
    margin-top: 20px;
    background: black;
    color: #00ff00;
    border: 2px solid #00ff00;
    padding: 10px 20px;
}
</style>

</head>

<body>

<h1 class="blink">💀 ACCESSING SYSTEM 💀</h1>

<p class="typing">hack protocol...</p>

<button onclick="startHack()">Start</button>

<p id="output"></p>

<script>
function startHack() {
    let text = "Access Granted ✅";
    document.getElementById("output").innerHTML = text;
}
</script>

</body>
</html>
